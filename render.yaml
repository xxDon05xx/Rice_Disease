# render.yaml — Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rice-disease-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app1:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
